name: "Create a Version Badge"

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/VERSION.md"
  workflow_dispatch:

jobs:
  version_badge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from file
        id: version
        run: |
          set -euo pipefail
          # Finds the header and skips exactly 1 line to grab the version
          VERSION=$(sed -n '/## Current Version/{n;p;}' docs/VERSION.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)

          if [ -z "${VERSION}" ]; then
            echo "Failed to extract version from docs/VERSION.md" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Version Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: d0f70dbe1fa864c035f90ddf5fcce2a5
          filename: version_JSTS-SaleBot.json
          label: Version
          message: ${{ steps.version.outputs.version }}
          color: brightgreen
