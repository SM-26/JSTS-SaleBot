name: TypeScript CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 
          cache: 'npm'       
      - name: Install dependencies
        run: npm ci

      - name: Type check (TypeScript)
        run: npm run build
      - name: Linting
        # Only runs if you have a lint script (like eslint) in package.json
        run: npm run lint || echo "No lint script found, skipping."
        continue-on-error: true

      - name: Run tests
        # Only runs if you have a test script in package.json
        run: npm test || echo "No tests found, skipping."
        continue-on-error: true