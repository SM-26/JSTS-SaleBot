name: TypeScript CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Forces the runner to use Node 24 for the internal Action logic
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Updated to Node 24 for 2026 standards
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (TypeScript)
        # Using build to ensure the TS compiler (tsc) passes
        run: npm run build

      - name: Linting
        # Runs linting but won't fail the whole CI if it fails (per your original logic)
        run: npm run lint || echo "No lint script found, skipping."
        continue-on-error: true

      - name: Run tests
        # Runs tests but won't fail the whole CI if it fails
        run: npm test || echo "No tests found, skipping."
        continue-on-error: true
