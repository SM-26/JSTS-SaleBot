version: 2
updates:
  # Maintain npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      telegram-stack:
        patterns:
          - "node-telegram-bot-api"
          - "@types/node-telegram-bot-api"
      database:
        patterns:
          - "mongoose"
          - "mongodb"
      development-tooling:
        patterns:
          - "typescript"
          - "ts-node"
          - "nodemon"
          - "@types/*"
          - "eslint*"
          - "globals"
          - "prettier*"
        update-types:
          - "minor"
          - "patch"
      environment:
        patterns:
          - "dotenv*"
      other-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
