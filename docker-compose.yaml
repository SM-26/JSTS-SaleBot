services:
  bot:
    build:
      context: .
      dockerfile: dockerfile
      target: development
    container_name: jsts-salebot # Easier to find in 'docker ps'
    # command: npm run dev -- --inspect=0.0.0.0:9229
    # command: npx ts-node src/bot.ts --inspect=0.0.0.0:9221
    # command: node -r ts-node/register src/bot.ts
    command: node --inspect=0.0.0.0:9221 -r ts-node/register src/bot.ts
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      # - NODE_OPTIONS=--inspect=0.0.0.0:9221
    ports:
      - "9221:9221"
    depends_on:
      mongoserver:
        condition: service_healthy

  mongoserver:
    image: mongo:latest
    restart: always
    command: [ "mongod", "--quiet" ]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongoserver
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=true
      - ME_CONFIG_MONGODB_URL=mongodb://mongoserver:27017
    depends_on:
      mongoserver:
        condition: service_healthy

volumes:
  mongodb_data:
